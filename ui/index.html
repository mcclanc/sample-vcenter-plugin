<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="VMware Tanzu Platform is an AI-ready, integrated private cloud Platform-as-a-Service (PaaS) designed to accelerate development, deployment, and management of secure applications on Kubernetes-based infrastructure."
    />
    <title>Tanzu Platform Integration</title>
    <style>
      html:not([data-theme]),
      body:not([cds-theme]) {
        background: transparent;
      }
    </style>
    <script type="text/javascript" src="/api/ui/htmlClientSdk.js"></script>
    <script>
      (function () {
        var base = document.createElement("base");
        base.href =
          htmlClientSdk.getProxiedPluginServerOrigin() + "/tanzu-hub-poc-ui/";
        document.head.appendChild(base);
      })();
    </script>
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <h1 data-i18n="plugin.name">Tanzu Platform Integration</h1>
      <p class="muted" data-i18n="plugin.summary">
        VMware Tanzu Platform is an AI-ready, integrated private cloud Platform-as-a-Service (PaaS)
        designed to accelerate development, deployment, and management of secure applications on
        Kubernetes-based infrastructure.
      </p>
    </header>

    <main class="main-content">
      <div class="card-row">
        <section class="assess-card" aria-label="Application assessment">
          <button type="button" class="assess-card__surface" id="assess-card-open">
            <span class="assess-card__title">
              Assess your applications for viability for deployment on to Tanzu Platform.
            </span>
          </button>
        </section>
        <section class="assess-card" aria-label="Tanzu Data Intelligence">
          <button type="button" class="assess-card__surface" id="data-intel-card-open">
            <span class="assess-card__title">
              Let AI drive your data with Tanzu Data Intelligence
            </span>
          </button>
        </section>
        <section class="assess-card" aria-label="Secure images and enterprise services">
          <button type="button" class="assess-card__surface" id="secure-enterprise-card-open">
            <span class="assess-card__title">
              Unlock the power secure images and enterprise service offerings with Tanzu Platform
            </span>
          </button>
        </section>
      </div>
    </main>

    <dialog class="ova-modal" id="ova-modal" aria-labelledby="ova-modal-title">
      <div class="ova-modal__inner">
        <header class="ova-modal__header">
          <h2 class="ova-modal__title" id="ova-modal-title">Install Tanzu Hub</h2>
          <button type="button" class="ova-modal__close" id="ova-modal-close" aria-label="Close">
            ×
          </button>
        </header>
        <form id="ova-install-form" class="form" method="dialog">
          <label>
            OVA name
            <input type="text" name="ovaName" required autocomplete="off" placeholder="e.g. tanzu-platform-eval" />
          </label>
          <label>
            OVA URL or Content Library path
            <input type="url" name="ovaUrl" placeholder="https://…/appliance.ova" />
          </label>
          <label>
            Target VM name
            <input type="text" name="vmName" placeholder="vm-name-in-vcenter" />
          </label>
          <label>
            Notes
            <textarea name="notes" rows="3" placeholder="Datastore, network, DNS, sizing…"></textarea>
          </label>
          <div class="ova-modal__actions">
            <button type="button" class="btn-secondary" id="ova-modal-cancel">Cancel</button>
            <button type="button" class="btn-primary" id="stub-action">Validate (stub)</button>
          </div>
        </form>
        <pre id="log" class="log" aria-live="polite"></pre>
      </div>
    </dialog>

    <script type="module" src="main.js"></script>
  </body>
</html>
