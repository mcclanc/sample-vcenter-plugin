#CONTEXT PATH
server.servlet.context-path=/sample-ui
#HTTPS CONNECTION
server.port = 8443
server.ssl.key-store = classpath:keystore.jks
# Passphrase for the bundled SDK sample keystore — set in the shell (see README “Credentials”).
server.ssl.key-store-password=${KEYSTORE_PASSWORD}
server.ssl.key-store-type = JKS
#Static Resources
spring.main.allow-bean-definition-overriding=true
spring.web.resources.static-locations=classpath:/ui/,classpath:/static/
spring.devtools.restart.additional-exclude=ui/**
#Path to logging file. Logs are printed in the console too.
logging.file.path=
