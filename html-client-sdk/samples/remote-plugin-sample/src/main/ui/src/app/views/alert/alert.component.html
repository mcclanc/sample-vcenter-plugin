@if (error) {
   <clr-alert clrAlertType="danger"
              [clrAlertClosedChange]="onAlertClose()">
      <clr-alert-item>
         <span class="alert-text">{{ error.message }}</span>
      </clr-alert-item>
   </clr-alert>
}
