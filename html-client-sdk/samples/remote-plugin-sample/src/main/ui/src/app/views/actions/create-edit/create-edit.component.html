<app-alert-message [error]="error"></app-alert-message>

<form clrForm
      clrLayout="horizontal"
      clrLabelSize="4"
      [formGroup]="form"
      (ngSubmit)="onSubmit()">
   <div class="modal-body">
      <!-- Chassis Name -->
      <clr-input-container>
         <label>{{'common.name' | translate}}</label>
         <input clrInput
                formControlName="name"
                [placeholder]="'actions.namePlaceholder' | translate"
                required
                autofocus />
         <clr-control-error>
            {{'actions.create.emptyNameError' | translate}}
         </clr-control-error>
      </clr-input-container>

      <!-- Chassis Server Type -->
      <clr-input-container>
         <label>{{'common.serverType' | translate}}</label>
         <input clrInput
                formControlName="serverType"
                [placeholder]="'actions.serverTypePlaceholder' | translate" />
      </clr-input-container>

      <!-- Chassis Dimensions -->
      <clr-input-container>
         <label>{{'common.dimensions' | translate}}</label>
         <input clrInput
                formControlName="dimensions"
                [placeholder]="'actions.dimensionsPlaceholder' | translate" />
      </clr-input-container>

      <!-- Chassis isActive -->
      <clr-checkbox-container>
         <label cds-layout="horizontal gap:xsm">
            {{ 'common.state' | translate }}
            <clr-tooltip>
               <cds-icon clrTooltipTrigger
                         shape="info-standard"
                         status="info"
                         size="18">
               </cds-icon>
               <clr-tooltip-content clrPosition="top-right"
                                    clrSize="md">
                  {{ 'actions.whatCanTheStateBe' | translate }}
               </clr-tooltip-content>
            </clr-tooltip>
         </label>
         <clr-checkbox-wrapper>
            <input clrCheckbox
                   formControlName="isActive"
                   type="checkbox"
                   name="active" />
            <label>{{ 'common.active' | translate }}</label>
         </clr-checkbox-wrapper>
      </clr-checkbox-container>

      <div class="clr-form-control clr-row">
         <label class="clr-control-label">
            {{ 'actions.create.wizardPage3' | translate }}
         </label>
      </div>

      <app-hosts-list-view [preselectedHostsIds]="chassis.relatedHostsIds || []"
                           (hostsSelectionChange)="onHostsSelectionChange($event)"
                           (onNavigateToHostObject)="onNavigateToHostObject()"
                           (onError)="onError($event)">
      </app-hosts-list-view>
   </div>

   <div class="modal-footer">
      <button type="button"
              class="btn"
              (click)="onCancel()"
              id="cancelBtn">
         {{ 'common.cancel' | translate }}
      </button>
      <button type="button"
              class="btn btn-primary"
              id="saveBtn"
              (click)="onSubmit()"
              [disabled]="!form.valid">
         {{ 'common.ok' | translate }}
      </button>
   </div>
</form>
