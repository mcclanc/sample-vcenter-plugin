<clr-stack-view>
   @if (loading) {
      <clr-stack-block>
         <span class="spinner spinner-inline"></span>
         <span>Loading...</span>
      </clr-stack-block>
   } @else {
      <clr-stack-block>
         <clr-stack-label>Related Chassis</clr-stack-label>
         <clr-stack-content (click)="navigateToHostMonitorView()">
            <a>{{numberOfRelatedChassis}}</a>
         </clr-stack-content>
      </clr-stack-block>
   }
</clr-stack-view>
